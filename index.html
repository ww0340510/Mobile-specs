        body {

            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #1a73e8;
        }
        button {
            padding: 12px 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #1557b0;
        }
        .loading {
            text-align: center;
            font-weight: bold;
            color: #666;
            display: none;
        }
        .phone-title {
            color: #1a73e8;
            border-bottom: 2px solid #1a73e8;
            padding-bottom: 8px;
            margin-top: 20px;
        }
        .image-container {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin: 20px 0;
        }
        .image-box {
            text-align: center;
            flex: 1;
        }
        .image-box img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fafafa;
        }
        .image-label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-top: 5px;
        }
        .spec-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .spec-item:last-child {
            border-bottom: none;
        }
        .spec-label {
            font-weight: bold;
            color: #1a73e8;
            font-size: 14px;
            text-transform: uppercase;
        }
        .spec-value {
            font-size: 16px;
            color: #444;
            line-height: 1.4;
        }
        .error-msg {
            color: #d93025;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

function searchPhone() {
    const phoneInput = document.getElementById('phoneInput').value.trim().toLowerCase().replace(/\s+/g, '');
    const resultContent = document.getElementById('resultContent');
    const loading = document.getElementById('loading');
    
    if(!phoneInput) {
        alert("Please enter a mobile name first!");
        return;
    }

    resultContent.innerHTML = "";
    loading.style.display = "block";

    // Matching query
    const matchedPhone = mobileDatabase.find(phone => {
        const databaseName = phone.name.toLowerCase().replace(/\s+/g, '');
        return databaseName.includes(phoneInput) || phoneInput.includes(databaseName);
    });

    setTimeout(() => {
        loading.style.display = "none";

        if (matchedPhone) {
            let htmlOutput = `<h3 class="phone-title">${matchedPhone.name} (${matchedPhone.brand})</h3>`;
            htmlOutput += `
                <div class="image-container">
                    <div class="image-box">
                        <img src="${matchedPhone.front_image}" alt="Front View">
                        <div class="image-label">Front View</div>
                    </div>
                    <div class="image-box">
                        <img src="${matchedPhone.back_image}" alt="Back View">
                        <div class="image-label">Back View</div>
                    </div>
                </div>
            `;
            
            for (const [key, value] of Object.entries(matchedPhone.specs)) {
                htmlOutput += `
                    <div class="spec-item">
                        <span class="spec-label">${key}</span>
                        <span class="spec-value">${value}</span>
                    </div>
                `;
            }
            resultContent.innerHTML = htmlOutput;
        } else {
            resultContent.innerHTML = "<p class='error-msg'>Mobile not found! Please make sure the spelling is correct or try a different brand.</p>";
        }
    }, 300);
}
