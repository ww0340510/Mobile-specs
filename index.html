<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Mobile Specs Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #111827;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #2563eb;
        }
        button {
            padding: 14px 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #2563eb;
            display: none;
            margin: 20px 0;
            font-weight: 500;
        }
        .phone-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .phone-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #1f2937;
            margin-bottom: 15px;
        }
        .img-wrapper {
            display: flex;
            justify-content: center;
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .img-wrapper img {
            max-height: 250px;
            object-fit: contain;
        }
        .specs-table {
            width: 100%;
            border-collapse: collapse;
        }
        .specs-row {
            border-bottom: 1px solid #f3f4f6;
        }
        .specs-row:last-child {
            border-bottom: none;
        }
        .specs-label {
            padding: 12px 8px;
            font-weight: 600;
            color: #2563eb;
            width: 35%;
            font-size: 14px;
        }
        .specs-val {
            padding: 12px 8px;
            color: #4b5563;
            font-size: 14px;
        }
        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Universal Mobile Finder</h2>
    <div class="subtitle">Dunya Ka Koi Bhi Phone Search Karein — Live API, Real Pics & Real Specs</div>
    
    <div class="search-box">
        <input type="text" id="phoneInput" placeholder="Brand ya model likhein (e.g., s24 ultra, iphone 16, y03)...">
        <button onclick="searchGlobalAPI()">Search</button>
    </div>

    <div id="loading" class="loading">Searching Global Database & Extracting Specs...</div>
    <div id="result"></div>
</div>

<script>
async function searchGlobalAPI() {
    const input = document.getElementById('phoneInput').value.trim();
    const resultDiv = document.getElementById('result');
    const loadingDiv = document.getElementById('loading');

    if (!input) {
        alert("Pehle mobile ka naam likhein!");
        return;
    }

    resultDiv.innerHTML = "";
    loadingDiv.style.display = "block";

    // Ulta-seedha input handle karne ke liye query ko clean karna
    const cleanQuery = input.toLowerCase();

    try {
        // Step 1: Global Phone Search API se devices ki list fetch karna
        const searchUrl = `https://openapi.programming-hero.com/api/phones?search=${encodeURIComponent(cleanQuery)}`;
        const response = await fetch(searchUrl);
        const data = await response.json();

        if (data.status && data.data && data.data.length > 0) {
            // Sabse pehla aur best matching phone uthana
            const phoneShortInfo = data.data[0];
            const phoneSlug = phoneShortInfo.slug; // Har phone ka unique code/slug

            // Step 2: Us unique phone ki deep technical specifications fetch karna
            const detailsUrl = `https://openapi.programming-hero.com/api/phone/${phoneSlug}`;
            const detailResponse = await fetch(detailsUrl);
            const detailData = await detailResponse.json();

            loadingDiv.style.display = "none";

            if (detailData.status && detailData.data) {
                renderUniversalUI(detailData.data, resultDiv);
            } else {
                showError(resultDiv);
            }
        } else {
            loadingDiv.style.display = "none";
            resultDiv.innerHTML = `<div class="error">Dunya ke database mein yeh model nahi mila! Spelling thodi theek kar ke try karein.</div>`;
        }
    } catch (e) {
        loadingDiv.style.display = "none";
        showError(resultDiv);
    }
}

function renderUniversalUI(phone, container) {
    // API se aane wali real specific fields
    const mainSpecs = phone.mainFeatures || {};
    
    container.innerHTML = `
        <div class="phone-card">
            <div class="phone-title">${phone.name}</div>
            <div class="img-wrapper">
                <img src="${phone.image}" alt="${phone.name}" onerror="this.src='https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=400'">
            </div>
            <table class="specs-table">
                <tr class="specs-row"><td class="specs-label">Brand</td><td class="specs-val">${phone.brand}</td></tr>
                <tr class="specs-row"><td class="specs-label">Processor</td><td class="specs-val">${mainSpecs.chipSet || 'Official Chipset Data'}</td></tr>
                <tr class="specs-row"><td class="specs-label">Display</td><td class="specs-val">${mainSpecs.displaySize || 'Official Screen Specs'}</td></tr>
                <tr class="specs-row"><td class="specs-label">Memory</td><td class="specs-val">${mainSpecs.memory || 'Official RAM & Storage'}</td></tr>
                <tr class="specs-row"><td class="specs-label">Release Date</td><td class="specs-val">${phone.releaseDate || 'Check Official Site'}</td></tr>
            </table>
        </div>
    `;
}

function showError(container) {
    container.innerHTML = `<div class="error">Network error ya API response slow hai. Dobara koshish karein!</div>`;
}
</script>

</body>
</html>
